name: Build Audiobasics Desk

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:

  build-windows:
    name: Build Windows (.msi)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'

      - name: Build MSI
        run: gradle :composeApp:packageMsi

      - name: Zip MSI
        run: |
          $msi = Get-ChildItem -Recurse -Filter "*.msi" | Select-Object -First 1
          Compress-Archive -Path $msi.FullName -DestinationPath AudiobasicsDesk-Windows.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: AudiobasicsDesk-Windows
          path: AudiobasicsDesk-Windows.zip

  build-linux:
    name: Build Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'

      - name: Build DEB
        run: gradle :composeApp:packageDeb

      - name: Zip DEB
        run: |
          DEB=$(find . -name "*.deb" | head -1)
          zip AudiobasicsDesk-Linux.zip "$DEB"

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: AudiobasicsDesk-Linux
          path: AudiobasicsDesk-Linux.zip
